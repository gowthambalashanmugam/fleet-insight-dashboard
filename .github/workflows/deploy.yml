name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fleet-pulse/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: fleet-pulse

      - name: Build for production
        run: npx ng build --base-href /fleet-insight-dashboard/
        working-directory: fleet-pulse

      - name: Copy index.html to 404.html (SPA routing)
        run: cp dist/fleet-insight-dashboard/browser/index.html dist/fleet-insight-dashboard/browser/404.html
        working-directory: fleet-pulse

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fleet-pulse/dist/fleet-insight-dashboard/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
