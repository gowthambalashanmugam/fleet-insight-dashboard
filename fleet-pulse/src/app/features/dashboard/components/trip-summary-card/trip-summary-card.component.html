<div class="trip-summary-card flex items-center justify-between">
  <div class="flex flex-col gap-1">
    <span class="text-sm" style="color: var(--color-text-secondary)">
      {{ title() }}
    </span>
    <span class="text-2xl font-bold" style="color: var(--color-text-primary)">
      {{ value() }}
    </span>
    <span class="trend text-xs font-semibold" [style.color]="trendColor">
      {{ trendArrow }} {{ trendPercentage() }}%
    </span>
  </div>
  @if (chartLoading()) {
    <div class="chart-placeholder rounded bg-gray-200 animate-pulse" style="width: 60px; height: 40px;" aria-label="Loading chart"></div>
  } @else if (chartError()) {
    <div class="chart-error text-xs" style="width: 60px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--color-trend-down, #ef4444);">
      {{ chartError() }}
    </div>
  } @else {
    <canvas #chartCanvas width="60" height="40" aria-hidden="true"></canvas>
  }
</div>
