<div class="map-wrapper">
  @if (leafletError(); as error) {
    <div class="map-error" role="alert">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v4m0 4h.01"/>
      </svg>
      <span>{{ error }}</span>
    </div>
  } @else if (!leafletReady()) {
    <div class="map-placeholder" aria-label="Loading map">
      <div class="map-placeholder-pulse"></div>
      <span class="map-placeholder-text">Loading map…</span>
    </div>
  } @else {
    <div #mapContainer class="map-container"></div>
  }

  @if (leafletReady()) {
    <div class="map-controls">
      <button
        type="button"
        class="control-btn"
        aria-label="Center on fleet"
        (click)="fitBounds()"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v4m0 12v4M2 12h4m12 0h4"/>
        </svg>
      </button>
      <button
        type="button"
        class="control-btn"
        aria-label="Zoom in"
        (click)="zoomIn()"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
      <button
        type="button"
        class="control-btn"
        aria-label="Zoom out"
        (click)="zoomOut()"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14"/>
        </svg>
      </button>
      <button
        type="button"
        class="control-btn"
        aria-label="Reset view"
        (click)="resetView()"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
        </svg>
      </button>
    </div>
  }
</div>
