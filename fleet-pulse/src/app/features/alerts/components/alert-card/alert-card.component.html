<div class="alert-card" [class.selected]="selected()">
  <!-- Checkbox outside card body -->
  <div class="card-checkbox">
    <input
      type="checkbox"
      class="alert-checkbox"
      [checked]="selected()"
      (change)="onSelectionChange()"
      [attr.aria-label]="'Select alert ' + alert().id"
    />
  </div>

  <!-- Card body: two-column layout -->
  <div class="card-body">
    <!-- Left content column -->
    <div class="card-content">
      <!-- Header row: badge + type + timestamp + delete -->
      <div class="card-header-row">
        <div class="header-left-group">
          <span
            class="severity-badge"
            [style.background-color]="getSeverityColor(alert().severity)"
          >
            ⚠ {{ getSeverityLabel(alert().severity) }}
          </span>
          <span class="alert-type-label">{{ getTypeLabel(alert().type) }}</span>
        </div>
        <div class="header-right-group">
          <span class="alert-date">{{ alert().timestamp | date:'MM/dd/yyyy' }}</span>
          <span class="date-separator">|</span>
          <span class="alert-time">{{ alert().timestamp | date:'h:mm a' }}</span>
          <button
            class="delete-btn"
            (click)="onDelete()"
            [attr.aria-label]="'Delete alert ' + alert().id"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Alert title -->
      <h3 class="alert-title">{{ alert().title }}</h3>

      <!-- Alert message -->
      <p class="alert-message">
        {{ displayMessage }}
        @if (isMessageTruncated) {
          <button class="read-more-btn" (click)="toggleReadMore()">
            {{ expanded ? 'Show less' : 'Read more...' }}
          </button>
        }
      </p>
    </div>

    <!-- Vertical divider -->
    <div class="card-divider"></div>

    <!-- Right vehicle column -->
    <div class="card-vehicle">
      <span class="vehicle-name">{{ alert().vehicleName }}</span>
      <div class="vehicle-image-placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="60" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="2" ry="2" />
          <polygon points="16 8 20 8 23 11 23 16 16 16 16 8" />
          <circle cx="5.5" cy="18.5" r="2.5" />
          <circle cx="18.5" cy="18.5" r="2.5" />
        </svg>
      </div>
      <a class="dashboard-link" href="javascript:void(0)">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
          fill="currentColor" stroke="none">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        DASHBOARD
      </a>
    </div>
  </div>
</div>
