<aside class="flex w-64 flex-col border-r border-gray-200 bg-white">
  <div class="flex h-16 items-center px-6 border-b border-gray-200">
    <span class="text-xl font-bold text-indigo-600">FleetInsight</span>
  </div>
  <nav class="flex-1 space-y-1 px-3 py-4">
    @for (item of navItems(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-indigo-50 text-indigo-600"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50"
      >
        <span>{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>
</aside>
