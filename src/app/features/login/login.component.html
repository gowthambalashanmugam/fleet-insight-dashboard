<div class="flex h-screen">
  <!-- Left side: Login form -->
  <div class="flex w-1/2 items-center justify-center bg-gray-900 px-12">
    <div class="w-full max-w-md">
      <div class="mb-10">
        <h1 class="text-3xl font-bold text-white">FleetInsight</h1>
        <p class="mt-2 text-sm text-gray-400">Sign in to your dashboard</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-300">
            Username
          </label>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            required
            autocomplete="username"
            placeholder="Enter your username"
            class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-white placeholder-gray-500 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-300">
            Password
          </label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="Enter your password"
            class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-3 text-white placeholder-gray-500 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
          />
        </div>

        @if (error()) {
          <p class="text-sm text-red-400">{{ error() }}</p>
        }

        <button
          type="submit"
          class="w-full rounded-lg bg-indigo-600 px-4 py-3 text-sm font-semibold text-white hover:bg-indigo-500 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-900 focus:outline-none transition-colors"
        >
          Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- Right side: Image -->
  <div class="hidden w-1/2 lg:block">
    <img
      src="images/login-bg.png"
      alt="Fleet truck on a city road at night"
      class="h-full w-full object-cover"
    />
  </div>
</div>
